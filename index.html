<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VetLink | Smart Pet Health & Vaccination Tracker</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- API Service -->
    <script src="js/api.js"></script>
</head>
<body>
    <nav class="navbar">
        <div class="container nav-content">
            <div class="logo-container" id="nav-logo">
                <img src="assets/logo.png" alt="VetLink Logo" class="logo-img">
            </div>
            
            <button class="mobile-menu-btn" id="mobile-menu-btn">
                <i data-lucide="menu"></i>
            </button>

            <ul class="nav-links" id="nav-links">
                <li><a href="#home" class="active">Home</a></li>
                <li><a href="#register">Register Pet</a></li>
                <li><a href="#dashboard">Dashboard</a></li>
                <li><a href="#vets">Find a Vet</a></li>
                <li><a href="#profile" class="btn-login" id="profile-link" style="display: none;">Profile</a></li>
                <li><a href="#login" class="btn-login" id="login-link">Login</a></li>
                <li><a href="#user-register" class="btn-login" id="register-link" style="display: none;">Sign Up</a></li>
            </ul>
        </div>
    </nav>

    <main id="app-root">
        <!-- Dynamic content will be injected here -->
        <div class="loading-state">
            <div class="spinner"></div>
        </div>
    </main>

    <footer class="footer">
        <div class="container footer-content">
            <div class="footer-brand">
                <div class="logo-container">
                    <img src="assets/logo.png" alt="VetLink Logo" class="logo-img" style="height: 40px;">
                </div>
                <p>Smart Pet Health & Vaccination Tracker</p>
            </div>
            <div class="footer-links">
                <h4>Platform</h4>
                <a href="#home">Home</a>
                <a href="#vets">Find a Vet</a>
                <a href="#register">Register Pet</a>
            </div>
            <div class="footer-contact">
                <h4>Contact</h4>
                <p>support@vetlink.lk</p>
                <div class="social-icons">
                    <i data-lucide="facebook"></i>
                    <i data-lucide="instagram"></i>
                    <i data-lucide="twitter"></i>
                </div>
            </div>
        </div>
        <div class="footer-bottom">
            <p>&copy; 2026 VetLink. Developed for Sri Lankan Pet Owners. A product of AIH Company.</p>
        </div>
    </footer>

    <script type="module" src="js/app.js"></script>
</body>
</html>
